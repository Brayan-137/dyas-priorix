$kind: http-request
name: Delete Activity
method: DELETE
url: '{{base_url_core}}/activities/{{activity_id}}'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
tests: |-
  pm.test("Status is 204 No Content", function () {
    pm.response.to.have.status(204);
  });

  pm.test("Has Authorization header set", function () {
    pm.expect(pm.request.headers.get('Authorization')).to.include('Bearer ');
  });