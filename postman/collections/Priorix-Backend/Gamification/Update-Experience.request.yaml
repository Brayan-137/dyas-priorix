$kind: http-request
name: Update Experience
method: POST
url: "{{base_url_gamification}}/gamification/update-experience"
order: 2000
headers:
  - key: Authorization
    value: "Bearer {{token}}"
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "type": "task_completed",
      "xp_reward": 50,
      "user_id": 2
    }
tests: |-
  pm.test("Status is 200 OK", function () {
    pm.response.to.have.status(200);
  });

  pm.test("Experience was updated", function () {
    const jsonData = pm.response.json();
    pm.expect(jsonData).to.be.an('object');
  });

  pm.test("Unauthorized without token returns 401", function () {
    // This test is a reminder — run without Authorization header to verify
  });

  pm.test("Has Authorization header set", function () {
    pm.expect(pm.request.headers.get('Authorization')).to.include('Bearer ');
  });
