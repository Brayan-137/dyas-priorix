$kind: http-request
name: Weekly Statistics
method: GET
url: '{{base_url_gamification}}/statistics/weekly'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
tests: |-
  pm.test("Status is 200 OK", function () {
    pm.response.to.have.status(200);
  });

  pm.test("Response has statistics data", function () {
    const jsonData = pm.response.json();
    pm.expect(jsonData).to.be.an('object');
  });

  pm.test("Has Authorization header set", function () {
    pm.expect(pm.request.headers.get('Authorization')).to.include('Bearer ');
  });