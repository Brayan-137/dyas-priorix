server {
    listen 80;

    location / {
        proxy_pass http://core:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Internal-Service $http_x_internal_service;
        proxy_set_header X-Internal-Service-Secret $http_x_internal_service_secret;
        proxy_set_header X-Internal-User-Id $http_x_internal_user_id;
    }
}

server {
    listen 81;

    location / {
        proxy_pass http://gamification:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Internal-Service $http_x_internal_service;
        proxy_set_header X-Internal-Service-Secret $http_x_internal_service_secret;
        proxy_set_header X-Internal-User-Id $http_x_internal_user_id;
    }
}

